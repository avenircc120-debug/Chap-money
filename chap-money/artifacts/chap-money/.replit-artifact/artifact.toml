kind = "web"
previewPath = "/"
title = "Chap Money Checkout"
version = "1.0.0"
id = "artifacts/chap-money"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25457

[services.development]
run = "pnpm --filter @workspace/chap-money run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chap-money", "run", "build" ]
serve = "static"
publicDir = "artifacts/chap-money/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25457"
BASE_PATH = "/"
